name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:

  # ── Detect changed paths (only on workflow_run, not tag push) ────────────────
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'cmd/**'
              - 'internal/**'

  # ── Build & push Docker images ───────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      always() && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
        (needs.detect-changes.result == 'success' && needs.detect-changes.outputs.backend == 'true')
      )
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: writer
            context: .
            dockerfile: cmd/writer/Dockerfile
          - service: reader
            context: .
            dockerfile: cmd/reader/Dockerfile
          - service: worker
            context: .
            dockerfile: cmd/worker/Dockerfile
          - service: dashboard
            context: packages/dashboard
            dockerfile: packages/dashboard/Dockerfile
          - service: docs
            context: docs-site
            dockerfile: docs-site/Dockerfile

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
