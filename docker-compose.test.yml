services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: batrewind
      POSTGRES_PASSWORD: batrewind
      POSTGRES_DB: batrewind_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U batrewind -d batrewind_test"]
      interval: 5s
      timeout: 5s
      retries: 10
