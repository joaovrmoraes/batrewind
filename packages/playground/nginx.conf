server {
    listen 3002;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Config endpoint — injects PLAYGROUND_API_KEY env var into JS
    # (nginx does not expand env vars in config by default;
    #  key is baked at build time via envsubst in the Dockerfile)
    location = /config.js {
        alias /usr/share/nginx/html/config.js;
        add_header Cache-Control "no-cache";
    }

    # Proxy /v1/ to writer for SDK ingestion
    location /v1/ {
        proxy_pass         http://writer:8080/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Static files (SPA — no client routing needed, single page)
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
