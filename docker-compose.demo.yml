# One-command demo: backend + dashboard + playground
# Usage: docker compose -f docker-compose.demo.yml up --build
#
# No seed data — interact with the playground to generate real sessions.
#
# URLs:
#   Playground  → http://localhost:3012
#   Dashboard   → http://localhost:3010  (login: admin@batrewind.local / admin123)
#   Writer API  → http://localhost:8090
#   Reader API  → http://localhost:8081

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: batrewind
      POSTGRES_PASSWORD: batrewind
      POSTGRES_DB: batrewind
    volumes:
      - demo_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "batrewind"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - demo_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  writer:
    build:
      context: .
      dockerfile: cmd/writer/Dockerfile
    ports:
      - "8090:8080"
    environment:
      DB_DRIVER: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: batrewind
      DB_PASSWORD: batrewind
      DB_NAME: batrewind
      REDIS_ADDR: redis:6379
      JWT_SECRET: demo-secret-change-in-prod
      INITIAL_OWNER_EMAIL: admin@batrewind.local
      INITIAL_OWNER_PASSWORD: admin123
      INITIAL_OWNER_NAME: Admin
      WRITER_PORT: 8080
      LOG_LEVEL: info
      INITIAL_API_KEY: rew_playground_demo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  reader:
    build:
      context: .
      dockerfile: cmd/reader/Dockerfile
    ports:
      - "8081:8081"
    environment:
      DB_DRIVER: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: batrewind
      DB_PASSWORD: batrewind
      DB_NAME: batrewind
      JWT_SECRET: demo-secret-change-in-prod
      READER_PORT: 8081
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: cmd/worker/Dockerfile
    environment:
      DB_DRIVER: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: batrewind
      DB_PASSWORD: batrewind
      DB_NAME: batrewind
      REDIS_ADDR: redis:6379
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ./packages/dashboard
      dockerfile: Dockerfile
    ports:
      - "3010:3000"
    depends_on:
      - reader

  playground:
    build:
      context: ./packages
      dockerfile: playground/Dockerfile
    ports:
      - "3012:3002"
    environment:
      # Must match INITIAL_API_KEY on the writer — auto-created on first boot
      PLAYGROUND_API_KEY: rew_playground_demo
      # Where the public /share/:token links point (the dashboard origin)
      DASHBOARD_URL: http://localhost:3010
    depends_on:
      - writer

volumes:
  demo_postgres:
  demo_redis:
